<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* Apply a mobile-first approach for responsiveness */
        .home {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .left_home,
        .right_home {
            width: 100%;
            max-width: 400px;
            /* Adjust the maximum width according to your design */
            margin: 20px;
        }

        .right_home {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bg_shape {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #007bff;
            /* Set the background color for the shape */
            z-index: -1;
        }

        /* Add responsive styles for larger screens using media queries */
        @media (min-width: 768px) {
            .home {
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
            }

            .left_home,
            .right_home {
                width: 45%;
                /* Adjust the width based on your design */
            }

            .right_home {
                order: -1;
                /* Move the right side to the left on larger screens */
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="home" id="home">
        <div class="left_home">
            <div class="content_about">
                <p>I'm <span>Urvish Patel</span></p>
                <p class="info_about">and I'm Full Stack Developer.</p>
            </div>
        </div>
        <div class="right_home">
            <div class="bg_shape"></div>
            <img src="assets/urvish.png" alt="">
        </div>
    </div>
</body>

</html>
